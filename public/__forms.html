<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form definitions</title>
    <meta name="robots" content="noindex" />
  </head>
  <body>
    <!--
      This file exists only so Netlify's build-time form parser can detect form
      definitions in a static HTML file. The actual contact form is rendered
      from app/contact/page.tsx via the React ContactForm component, which posts
      back to "/" with the same field names.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="company" />
      <textarea name="building"></textarea>
      <select name="help_type">
        <option value="Fractional CMO for contractors"></option>
        <option value="Fractional CTO – technology leadership"></option>
        <option value="AI automation systems"></option>
        <option value="Software or SaaS platform build"></option>
        <option value="CRM – marketing infrastructure"></option>
        <option value="Strategic partnership"></option>
        <option value="Other serious inquiry"></option>
      </select>
      <select name="company_stage">
        <option value="Startup / pre-revenue"></option>
        <option value="Under $1M/year"></option>
        <option value="$1M–$5M/year"></option>
        <option value="$5M–$10M/year"></option>
        <option value="$10M+/year"></option>
        <option value="Internal platform or venture-backed project"></option>
      </select>
      <textarea name="problem"></textarea>
    </form>
  </body>
</html>
